name: Migration Integration Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'tests/integration/**'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'tests/integration/**'

jobs:
  test-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh

      - name: Apply all migrations to local Postgres
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -f "$f" || true
          done

      - name: Run migration integration tests
        run: npx vitest run tests/integration/migrations/
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
