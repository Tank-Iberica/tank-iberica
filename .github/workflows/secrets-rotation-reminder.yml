name: 🔐 Secrets Rotation Reminder

on:
  schedule:
    # Every 6 months (1st of Feb & Aug at 09:00 UTC)
    - cron: '0 9 1 2,8 *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  create-reminder-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Determine rotation type
        id: rotation
        run: |
          MONTH=$(date +%m)
          MONTH_NAME=$(date +%B)
          echo "month_name=$MONTH_NAME" >> $GITHUB_OUTPUT
          if [[ $MONTH == "02" || $MONTH == "08" ]]; then
            echo "type=6-month (annual + 6-month keys)" >> $GITHUB_OUTPUT
            echo "keys=ANTHROPIC_API_KEY, OPENAI_API_KEY, CRON_SECRET, TURNSTILE_SECRET_KEY, CLOUDINARY_UPLOAD_PRESET, RESEND_API_KEY" >> $GITHUB_OUTPUT
          else
            # Annual (implied Jan/Jul if scheduler changes)
            echo "type=annual (all rotatable keys)" >> $GITHUB_OUTPUT
            echo "keys=See docs/tracciona-docs/referencia/SECRETS-ROTATION.md" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date();
            const month = date.toLocaleDateString('es-ES', { month: 'long' });
            const year = date.getFullYear();

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔐 Secrets Rotation Due — ${{ steps.rotation.outputs.type }} (${{ steps.rotation.outputs.month_name }})`,
              labels: ['security', 'ops', 'manual'],
              body: `## Secrets Rotation Checklist — ${month} ${year}

Rotation Type: **${{ steps.rotation.outputs.type }}**

### Keys to rotate this cycle:
- ${{ steps.rotation.outputs.keys }}

### Steps:
1. Follow procedures in [\`docs/tracciona-docs/referencia/SECRETS-ROTATION.md\`](../blob/main/docs/tracciona-docs/referencia/SECRETS-ROTATION.md)
2. Update each secret in:
   - Cloudflare Pages: Settings → Environment variables
   - GitHub Secrets: Settings → Secrets
3. Deploy: \`npm run build && npm run deploy\`
4. Verify each rotated secret (see doc for verification steps)
5. Close this issue once complete

### Frequency:
- **Annual** (Feb + Aug): All 6-month keys (Anthropic, OpenAI, Cron, Turnstile, etc.)
- **Annual only** (Jan): Service keys (Supabase, Stripe, WhatsApp, Resend)
- **Never**: Static references (URLs, cloud names, IDs)

See full inventory in the documentation.
`
            });

      - name: Comment on open rotation issues
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'secrets-rotation',
              state: 'open'
            });

            if (issues.data.length > 0) {
              console.log(`✓ Created secrets rotation reminder issue`);
              console.log(`Found ${issues.data.length} open rotation issues`);
            }
