name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=json --outputFile=coverage-summary.json
      - name: Verify coverage report
        run: |
          if [ ! -f coverage-summary.json ]; then
            echo "❌ Coverage report not generated"
            exit 1
          fi
          echo "✅ Coverage report verified"
      - name: Coverage gate (blocks if coverage drops)
        run: node scripts/check-coverage-gate.mjs
      - name: Verify pure utils have tests
        run: node scripts/check-pure-utils.mjs
      - name: Check circular dependencies
        run: node scripts/check-circular-deps.mjs
      - run: npm run typecheck
      - run: npm run build

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_DEALER_EMAIL: ${{ secrets.E2E_DEALER_EMAIL }}
          E2E_DEALER_PASSWORD: ${{ secrets.E2E_DEALER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  e2e-journeys:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx nuxi preview &
      - name: Wait for server health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && exit 0
            sleep 1
          done
          echo "❌ Server failed to start"
          exit 1
      - run: BASE_URL=http://localhost:3000 npx playwright test tests/e2e/journeys/
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_DEALER_EMAIL: ${{ secrets.E2E_DEALER_EMAIL }}
          E2E_DEALER_PASSWORD: ${{ secrets.E2E_DEALER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-journeys-report
          path: playwright-report/

  idor-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run IDOR protection tests
        run: npx vitest run tests/security/idor-protection.test.ts
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_KEY: ${{ secrets.STAGING_SUPABASE_KEY }}

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep SAST (blocking on findings)
        run: |
          semgrep \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --error \
            --exclude node_modules \
            --exclude .nuxt \
            --exclude dist \
            --exclude tests \
            --exclude '*.test.ts' \
            --exclude '*.spec.ts' \
            server/ app/

  lighthouse:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx lhci autorun
