# --- Tracciona SonarQube Configuration ---

sonar.projectKey=tracciona
sonar.projectName=Tracciona
sonar.projectVersion=1.0

# Host (local, never cloud)
sonar.host.url=http://localhost:9000

# IMPORTANT: token goes via CLI or env var, NEVER here
# Usage: SONAR_TOKEN=xxx bash sonar/run-scan.sh

# Source code (specific folders, not ".")
sonar.sources=app,server
sonar.tests=tests

# File types to include (only executable code)
sonar.inclusions=**/*.ts,**/*.vue,**/*.js

# Exclusions (non-executable or generated)
sonar.exclusions=\
  node_modules/**,\
  .nuxt/**,\
  .output/**,\
  dist/**,\
  supabase/migrations/**,\
  docs/**,\
  *.config.ts,\
  *.config.js,\
  coverage/**,\
  sonar/**,\
  public/**,\
  types/**,\
  i18n/**,\
  **/*.d.ts,\
  **/*.css,\
  **/*.scss,\
  **/*.json,\
  types/supabase.ts,\
  app/types/database.types.ts

# Coverage exclusions (non-executable files that shouldn't count for coverage)
sonar.coverage.exclusions=\
  **/*.d.ts,\
  **/*.css,\
  **/*.json,\
  types/**,\
  i18n/**

# Tests (analyzed for quality, excluded from coverage)
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Encoding
sonar.sourceEncoding=UTF-8

# ── Issue suppressions ──────────────────────────────────────────────────────
# css:S7924 — WCAG contrast: SonarQube cannot resolve CSS custom properties
# (var(--xxx)) from tokens.css at analysis time. All color/bg pairs in our
# design system are WCAG-AA-compliant (verified manually in tokens.css).
#
# css:S4666 — Duplicate selectors: all "duplicates" are inside @media queries
# (responsive breakpoint overrides). SonarQube cannot distinguish responsive
# patterns from true duplicates — these are intentional CSS architecture.
sonar.issue.ignore.multicriteria=css_s7924,css_s4666
sonar.issue.ignore.multicriteria.css_s7924.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.css_s7924.resourceKey=**/*
sonar.issue.ignore.multicriteria.css_s4666.ruleKey=css:S4666
sonar.issue.ignore.multicriteria.css_s4666.resourceKey=**/*

# TypeScript / JavaScript coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Vue SFC support — assign .vue to TypeScript only (our SFCs use <script lang="ts">)
sonar.lang.patterns.ts=**/*.ts,**/*.tsx,**/*.vue
sonar.lang.patterns.js=**/*.js,**/*.jsx,**/*.cjs,**/*.mjs
